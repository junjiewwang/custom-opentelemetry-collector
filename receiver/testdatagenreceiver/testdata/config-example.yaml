# ============================================================
# Exporters - 多后端鉴权示例
# ============================================================
exporters:
  # 后端 A：通过 OTLP gRPC 上报，使用 Bearer Token 鉴权
  otlp/backend-a:
    endpoint: ap-beijing.apm.example.com:4317
    headers:
      authorization: "Bearer YOUR_TOKEN_A"
    tls:
      insecure: true

  # 后端 B：通过 OTLP HTTP 上报，使用自定义 Header 鉴权
  otlphttp/backend-b:
    endpoint: http://ap-guangzhou.apm.example.com:80/otlp
    headers:
      authorization: "Bearer YOUR_TOKEN_B"
      "Content-Type": "application/json"
    tls:
      insecure: true
    encoding: json

  # Debug exporter 用于本地调试
  debug:
    verbosity: detailed

# ============================================================
# Processors
# ============================================================
processors:
  batch: {}
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

# ============================================================
# Service - Pipeline 配置
# ============================================================
service:
  pipelines:
    # Traces pipeline
    traces/testdata:
      receivers:
        - testdatagen
      processors:
        - memory_limiter
        - batch
      exporters:
        - otlp/backend-a
        - otlphttp/backend-b
        - debug

  telemetry:
    metrics:
      address: 0.0.0.0:8888
