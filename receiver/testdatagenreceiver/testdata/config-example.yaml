# Receivers
# ============================================================
receivers:
  # TestDataGen Receiver - 声明式配置驱动的测试数据生成器
  testdatagen:
    interval: 10s

    # 方式一：使用独立场景配置文件目录（推荐）
    # 每个场景一个 YAML 文件，便于管理和组织
    scenarios_dir: "./config/scenarios"

    # 方式二：内联配置（向后兼容，适合简单场景）
