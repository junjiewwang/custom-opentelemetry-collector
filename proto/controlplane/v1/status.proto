syntax = "proto3";

package io.opentelemetry.extension.controlplane.proto.v1;

option go_package = "go.opentelemetry.io/collector/custom/proto/controlplane/v1;controlplanev1";
option java_package = "io.opentelemetry.sdk.extension.controlplane.proto.v1";
option java_outer_classname = "StatusProtos";

import "controlplane/v1/common.proto";

// ===== 状态上报（心跳） =====

// 状态上报请求（纯心跳）
// 任务结果请使用专用接口 ReportTaskResult 上报
message StatusRequest {
  // Agent 身份标识（完整信息）
  AgentIdentity agent_identity = 1;

  // Agent ID 字符串（简化字段，优先使用）
  // 当只需要 ID 时使用此字段，避免构造完整的 AgentIdentity
  string agent_id = 7;

  // 上报时间 (毫秒时间戳)
  int64 timestamp_millis = 6;

  // ===== 以下字段已废弃，保留字段编号避免冲突 =====
  reserved 2, 3, 4, 5, 8;
  reserved "agent_status", "jvm_metrics", "task_results", "config_ack", "status_data";
}

// 状态上报响应
message StatusResponse {
  // 响应状态
  ResponseStatus status = 1;

  // 服务端时间 (毫秒时间戳)
  int64 server_time_millis = 2;

  // ===== 以下字段已废弃，保留字段编号避免冲突 =====
  reserved 3, 4, 5, 6;
  reserved "suggested_report_interval_millis", "acknowledged_task_ids", "success", "error_message";
}
