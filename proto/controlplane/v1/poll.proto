syntax = "proto3";

package io.opentelemetry.extension.controlplane.proto.v1;

option go_package = "go.opentelemetry.io/collector/custom/proto/controlplane/v1;controlplanev1";
option java_package = "io.opentelemetry.sdk.extension.controlplane.proto.v1";
option java_outer_classname = "PollProtos";

import "controlplane/v1/common.proto";
import "controlplane/v1/config.proto";
import "controlplane/v1/task.proto";

// ===== 统一轮询 (Unified Poll) =====

// 统一轮询请求
// 同时获取配置更新和待执行任务，减少 HTTP 往返
// 直接复用 ConfigRequest 和 TaskRequest，避免字段漂移
message UnifiedPollRequest {
  // Agent ID 字符串（用于鉴权和路由，优先级高于子请求中的 agent_id）
  string agent_id = 1;

  // 长轮询超时时间 (毫秒，优先级高于子请求中的 timeout)
  int64 timeout_millis = 2;

  // 配置请求（复用 config.proto）
  ConfigRequest config_request = 3;

  // 任务请求（复用 task.proto）
  TaskRequest task_request = 4;
}

// 统一轮询响应
// 直接复用 ConfigResponse 和 TaskResponse，避免字段漂移
message UnifiedPollResponse {
  // 响应状态
  ResponseStatus status = 1;

  // 是否有任何变更（配置或任务）
  bool has_any_changes = 2;

  // 配置响应（复用 config.proto）
  ConfigResponse config_response = 3;

  // 任务响应（复用 task.proto）
  TaskResponse task_response = 4;

  // 下次轮询建议间隔 (毫秒)
  int64 suggested_poll_interval_millis = 5;
}

// ===== 任务结果上报 =====

// 任务结果上报请求
// 直接复用 TaskResult (task.proto)，避免字段漂移
message TaskResultRequest {
  // Agent ID 字符串（用于鉴权和路由）
  string agent_id = 1;

  // 任务结果（复用 task.proto 的 TaskResult）
  TaskResult result = 2;
}

// 任务结果上报响应
message TaskResultResponse {
  // 响应状态
  ResponseStatus status = 1;

  // 是否成功接收
  bool acknowledged = 2;

  // 额外信息
  string message = 3;
}
