syntax = "proto3";

package io.opentelemetry.extension.controlplane.proto.v1;

option go_package = "go.opentelemetry.io/collector/custom/proto/controlplane/v1;controlplanev1";
option java_package = "io.opentelemetry.sdk.extension.controlplane.proto.v1";
option java_outer_classname = "PollProtos";

import "controlplane/v1/common.proto";
import "controlplane/v1/config.proto";
import "controlplane/v1/task.proto";

// ===== 统一轮询 (Unified Poll) =====

// 统一轮询请求
// 同时获取配置更新和待执行任务，减少 HTTP 往返
message UnifiedPollRequest {
  // Agent 身份标识
  AgentIdentity agent_identity = 1;

  // Agent ID 字符串（与 DTO 兼容，优先使用此字段）
  string agent_id = 6;

  // 当前配置版本信息
  ConfigVersion current_config_version = 2;

  // 当前配置版本字符串（与 DTO 兼容）
  string current_config_version_str = 7;

  // 当前配置 ETag（与 DTO 兼容）
  string current_config_etag = 8;

  // 长轮询超时时间 (毫秒)
  int64 timeout_millis = 3;

  // Agent 当前能力（用于任务下发筛选）
  AgentCapabilities capabilities = 4;
}

// 统一轮询响应
message UnifiedPollResponse {
  // 响应状态
  ResponseStatus status = 1;

  // 是否有任何变更（配置或任务）
  bool has_any_changes = 2;

  // 各类型轮询结果，key 为 "CONFIG" 或 "TASK"
  map<string, PollResult> results = 3;

  // 下次轮询建议间隔 (毫秒)
  int64 suggested_poll_interval_millis = 4;

  // 是否成功（与 DTO 兼容）
  bool success = 5;

  // 错误信息（与 DTO 兼容）
  string error_message = 6;
}

// 单类型轮询结果
message PollResult {
  // 结果类型: "CONFIG" 或 "TASK"
  string type = 1;

  // 是否有变更
  bool has_changes = 2;

  // ===== CONFIG 相关字段 (type="CONFIG" 时有效) =====

  // 配置数据
  bytes config_data = 3;

  // 配置版本
  string config_version = 4;

  // 配置 ETag
  string config_etag = 5;

  // ===== TASK 相关字段 (type="TASK" 时有效) =====

  // 下发的任务列表
  repeated Task tasks = 6;

  // 额外信息
  string message = 7;
}

// ===== 任务结果上报 =====

// 任务结果上报请求
message TaskResultRequest {
  // 任务 ID
  string task_id = 1;

  // Agent 身份标识
  AgentIdentity agent_identity = 2;

  // Agent ID 字符串（与 DTO 兼容，优先使用此字段）
  string agent_id = 10;

  // 任务执行状态
  TaskResultStatus status = 3;

  // 错误码（失败时），如 TASK_STALE、TASK_EXPIRED、TASK_REJECTED
  string error_code = 4;

  // 错误信息（失败时）
  string error_message = 5;

  // 任务输出结果（成功时，JSON 格式）
  bytes result_data = 6;

  // 任务输出结果 JSON 格式（与 DTO 兼容）
  string result_json = 11;

  // 任务开始执行时间 (毫秒时间戳)
  int64 started_at_millis = 7;

  // 任务完成时间 (毫秒时间戳)
  int64 completed_at_millis = 8;

  // 任务执行耗时 (毫秒)
  int64 execution_time_millis = 9;
}

// 任务结果状态（稳定集合）
enum TaskResultStatus {
  // 未指定
  TASK_RESULT_STATUS_UNSPECIFIED = 0;

  // 任务待执行
  TASK_RESULT_STATUS_PENDING = 1;

  // 任务执行中
  TASK_RESULT_STATUS_RUNNING = 2;

  // 任务执行成功
  TASK_RESULT_STATUS_SUCCESS = 3;

  // 任务执行失败（包括过期、过旧、被拒绝等，具体原因见 error_code）
  TASK_RESULT_STATUS_FAILED = 4;

  // 任务执行超时
  TASK_RESULT_STATUS_TIMEOUT = 5;

  // 任务被取消
  TASK_RESULT_STATUS_CANCELLED = 6;
}

// 任务结果上报响应
message TaskResultResponse {
  // 响应状态
  ResponseStatus status = 1;

  // 是否成功接收
  bool acknowledged = 2;

  // 是否成功（与 DTO 兼容）
  bool success = 4;

  // 错误信息（与 DTO 兼容）
  string error_message = 5;

  // 额外信息
  string message = 3;
}
