syntax = "proto3";

package io.opentelemetry.extension.controlplane.proto.v1;

option go_package = "go.opentelemetry.io/collector/custom/proto/controlplane/v1;controlplanev1";
option java_package = "io.opentelemetry.sdk.extension.controlplane.proto.v1";
option java_outer_classname = "CommonProtos";

// Agent 身份标识
message AgentIdentity {
  // Agent 唯一标识: ${hostname}-${pid}-${startTimeMillis}
  string agent_id = 1;

  // 主机名
  string host_name = 2;

  // 进程 ID
  string process_id = 3;

  // SDK 版本
  string sdk_version = 4;

  // 服务名称
  string service_name = 5;

  // 服务命名空间
  string service_namespace = 6;

  // Agent 启动时间 (毫秒时间戳)
  int64 start_time_millis = 7;

  // 扩展属性
  map<string, string> attributes = 8;

  // Agent IP 地址
  string ip = 9;
}

// 配置版本信息
message ConfigVersion {
  // 配置版本号
  string version = 1;

  // 配置时间戳 (毫秒时间戳)
  int64 timestamp_millis = 2;

  // ETag (用于 HTTP 缓存)
  string etag = 3;
}

// 通用响应状态
message ResponseStatus {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CODE_OK = 1;
    CODE_ERROR = 2;
    CODE_NOT_FOUND = 3;
    CODE_INVALID_ARGUMENT = 4;
    CODE_UNAVAILABLE = 5;
  }

  Code code = 1;
  string message = 2;
}

// ===== 全局统一枚举 =====

// 任务状态（全局统一，与 model.TaskStatus 对齐）
// 所有任务相关的状态都使用此枚举，避免多处定义导致的语义冲突
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;       // 待执行
  TASK_STATUS_RUNNING = 2;       // 执行中
  TASK_STATUS_SUCCESS = 3;       // 执行成功
  TASK_STATUS_FAILED = 4;        // 执行失败
  TASK_STATUS_TIMEOUT = 5;       // 执行超时
  TASK_STATUS_CANCELLED = 6;     // 已取消
  TASK_STATUS_RESULT_TOO_LARGE = 7;  // 结果超过最大阈值
}

// 压缩类型（全局统一）
enum CompressionType {
  COMPRESSION_TYPE_NONE = 0;
  COMPRESSION_TYPE_GZIP = 1;
}

// 健康状态（全局统一）
enum HealthState {
  HEALTH_STATE_UNSPECIFIED = 0;
  HEALTH_STATE_UNKNOWN = 1;
  HEALTH_STATE_HEALTHY = 2;
  HEALTH_STATE_DEGRADED = 3;
  HEALTH_STATE_UNHEALTHY = 4;
}
