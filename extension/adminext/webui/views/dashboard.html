<h2 class="text-2xl font-bold text-gray-800 mb-6">Dashboard Overview</h2>

<!-- Stats Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-gray-500 text-sm">Total Apps</p>
                <p class="text-3xl font-bold text-gray-800" x-text="dashboard.apps?.total || 0"></p>
            </div>
            <div class="w-12 h-12 bg-primary-100 rounded-lg flex items-center justify-center">
                <i class="fas fa-cube text-primary-600 text-xl"></i>
            </div>
        </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-gray-500 text-sm">Online Instances</p>
                <p class="text-3xl font-bold text-success-600" x-text="dashboard.instances?.online || 0"></p>
            </div>
            <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                <i class="fas fa-server text-green-600 text-xl"></i>
            </div>
        </div>
        <div class="mt-3 flex gap-4 text-sm">
            <span class="text-gray-500">Total: <span class="text-gray-700" x-text="dashboard.instances?.total || 0"></span></span>
            <span class="text-red-500">Offline: <span x-text="dashboard.instances?.offline || 0"></span></span>
        </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-gray-500 text-sm">Unhealthy</p>
                <p class="text-3xl font-bold" :class="(dashboard.instances?.unhealthy || 0) > 0 ? 'text-danger-500' : 'text-gray-800'" 
                   x-text="dashboard.instances?.unhealthy || 0"></p>
            </div>
            <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center">
                <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
            </div>
        </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-gray-500 text-sm">Pending Tasks</p>
                <p class="text-3xl font-bold text-warning-500" x-text="dashboard.tasks?.pending || 0"></p>
            </div>
            <div class="w-12 h-12 bg-yellow-100 rounded-lg flex items-center justify-center">
                <i class="fas fa-tasks text-yellow-600 text-xl"></i>
            </div>
        </div>
    </div>
</div>

<!-- Quick Actions -->
<div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
    <h3 class="text-lg font-semibold text-gray-800 mb-4">Quick Actions</h3>
    <div class="flex flex-wrap gap-3">
        <button @click="currentView = 'apps'; showCreateAppModal = true" 
            class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition flex items-center gap-2">
            <i class="fas fa-plus"></i> Create App
        </button>
        <button @click="currentView = 'instances'; loadInstances()" 
            class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition flex items-center gap-2">
            <i class="fas fa-sync"></i> Refresh Instances
        </button>
        <button @click="currentView = 'tasks'" 
            class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition flex items-center gap-2">
            <i class="fas fa-list-check"></i> View Tasks
        </button>
    </div>
</div>
