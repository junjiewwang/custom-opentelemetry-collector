<div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Applications</h2>
    <button @click="showCreateAppModal = true" 
        class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition flex items-center gap-2">
        <i class="fas fa-plus"></i> Create App
    </button>
</div>

<!-- Apps Table -->
<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full">
        <thead class="bg-gray-50 border-b border-gray-100">
            <tr>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Name</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Token</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Agents</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Status</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Created</th>
                <th class="px-6 py-4 text-right text-sm font-semibold text-gray-600">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            <template x-for="app in apps" :key="app.id">
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4">
                        <div class="font-medium text-gray-800" x-text="app.name"></div>
                        <div class="text-xs text-gray-400 font-mono" x-text="app.id"></div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <code class="text-sm bg-gray-100 px-2 py-1 rounded" x-text="app.token?.substring(0, 16) + '...'"></code>
                            <button @click="copyToClipboard(app.token)" class="text-gray-400 hover:text-gray-600">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded-full text-sm" x-text="app.agent_count || 0"></span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-sm"
                            :class="app.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'"
                            x-text="app.status || 'active'"></span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500" x-text="formatDate(app.created_at)"></td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button @click="viewAppDetail(app)" class="p-2 text-gray-400 hover:text-primary-600 transition" title="View">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button @click="editApp(app)" class="p-2 text-gray-400 hover:text-primary-600 transition" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button @click="openSetTokenModal(app)" class="p-2 text-gray-400 hover:text-warning-500 transition" title="Manage Token">
                                <i class="fas fa-key"></i>
                            </button>
                            <button @click="confirmDeleteApp(app)" class="p-2 text-gray-400 hover:text-danger-500 transition" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </template>
            <tr x-show="apps.length === 0">
                <td colspan="6" class="px-6 py-12 text-center text-gray-500">
                    <i class="fas fa-inbox text-4xl mb-3 text-gray-300"></i>
                    <p>No applications found</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>
