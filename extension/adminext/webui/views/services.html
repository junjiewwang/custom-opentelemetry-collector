<div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Services</h2>
    <button @click="loadServices()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">
        <i class="fas fa-sync"></i> Refresh
    </button>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <template x-for="service in services" :key="service.service_name + service.app_id">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition">
            <div class="flex items-start justify-between mb-4">
                <div>
                    <h3 class="font-semibold text-gray-800" x-text="service.service_name"></h3>
                    <p class="text-sm text-gray-500" x-text="service.app_name"></p>
                </div>
                <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium" 
                    x-text="service.instance_count + ' instances'"></span>
            </div>
            <button @click="viewServiceInstances(service)" 
                class="w-full mt-4 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition text-sm">
                View Instances
            </button>
        </div>
    </template>
    <div x-show="services.length === 0" class="col-span-full text-center py-12 text-gray-500">
        <i class="fas fa-sitemap text-4xl mb-3 text-gray-300"></i>
        <p>No services found</p>
    </div>
</div>
