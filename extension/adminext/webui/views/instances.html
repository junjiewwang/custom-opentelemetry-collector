<div class="fade-in">
    <!-- Arthas Task Status Panel (Synchronized from arthas.html) -->
    <div x-show="arthasTask.active || (arthasTask.taskId && arthasTask.status !== 'success' && arthasTask.status !== '')" x-cloak 
        class="mb-6 p-4 rounded-lg border slide-in"
        :class="{
            'bg-blue-50 border-blue-200': arthasTask.status === 'pending' || arthasTask.status === 'running',
            'bg-green-50 border-green-200': arthasTask.status === 'success',
            'bg-red-50 border-red-200': arthasTask.status === 'failed' || arthasTask.status === 'timeout',
            'bg-gray-50 border-gray-200': !arthasTask.status
        }">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="text-lg"
                    :class="{
                        'fas fa-spinner fa-spin text-blue-500': arthasTask.status === 'pending' || arthasTask.status === 'running',
                        'fas fa-check-circle text-green-500': arthasTask.status === 'success',
                        'fas fa-times-circle text-red-500': arthasTask.status === 'failed' || arthasTask.status === 'timeout',
                        'fas fa-info-circle text-gray-500': !arthasTask.status
                    }"></i>
                <div>
                    <div class="font-medium text-gray-800">
                        <span x-text="(arthasTask.taskType === 'attach' ? 'Arthas Attach' : 'Arthas Detach') + ' : ' + (arthasTask.targetAgentId ? arthasTask.targetAgentId.substring(0, 12) + '...' : '')"></span>
                        <span class="text-gray-400 text-[10px] ml-2 font-normal" x-show="arthasTask.taskId">
                            ID: <span x-text="arthasTask.taskId.substring(0, 8)"></span>...
                        </span>
                    </div>
                    <div class="text-sm text-gray-600" x-text="arthasTask.message"></div>
                </div>
            </div>
            <button x-show="!arthasTask.active" @click="closeTaskPanel()" 
                class="text-gray-400 hover:text-gray-600 transition">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Header: Title & Actions -->
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-gray-800">实例管理</h2>
        <div class="flex items-center gap-3">
            <div class="relative">
                <input type="text" x-model="instanceSearch" @input.debounce.300ms="applyInstanceFilter()"
                    placeholder="搜索 Agent ID, Host, Service..." 
                    class="pl-9 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 w-48 text-sm">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>
            <button @click="loadInstances()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition text-sm">
                <i class="fas fa-sync" :class="loading.instances ? 'fa-spin' : ''"></i>
            </button>
        </div>
    </div>

    <!-- Quick Stats (Clickable Filters) -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-6">
        <template x-for="stat in [
            { label: '全部', filter: 'all', icon: 'fas fa-server', color: 'text-gray-500' },
            { label: '在线', filter: 'online', icon: 'fas fa-check-circle', color: 'text-green-500' },
            { label: '离线', filter: 'offline', icon: 'fas fa-moon', color: 'text-gray-400' },
            { label: 'Arthas 就绪', filter: 'arthas_ready', icon: 'fas fa-bug', color: 'text-purple-500' },
            { label: 'Arthas 未注册', filter: 'arthas_not_ready', icon: 'fas fa-unlink', color: 'text-orange-500' }
        ]" :key="stat.filter">
            <div @click="instanceFilter = stat.filter; applyInstanceFilter()" 
                 :class="instanceFilter === stat.filter ? 'ring-2 ring-primary-500 bg-primary-50' : 'bg-white'"
                 class="p-4 rounded-xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition group">
                <div class="flex items-center justify-between mb-1">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest" x-text="stat.label"></p>
                    <i :class="stat.icon + ' ' + stat.color" class="opacity-40 group-hover:opacity-100 transition text-xs"></i>
                </div>
                <p class="text-2xl font-bold text-gray-800" x-text="getInstanceStats()[stat.filter]"></p>
            </div>
        </template>
    </div>

    <!-- Two-column Layout: Left Tree + Right Instance List -->
    <div class="flex gap-6" style="min-height: 500px;">
        
        <!-- Left Column: Navigation Tree -->
        <div class="w-72 flex-shrink-0">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden sticky top-4">
                <div class="px-4 py-3 bg-gray-50 border-b border-gray-100">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">App / Service</h3>
                </div>
                <div class="overflow-y-auto" style="max-height: calc(100vh - 320px);">
                    <!-- Empty State -->
                    <div x-show="instanceTreeData.length === 0" class="p-6 text-center text-gray-400 text-xs">
                        <i class="fas fa-folder-open text-2xl mb-2 text-gray-200 block"></i>
                        暂无数据
                    </div>

                    <!-- "All" Node -->
                    <div @click="selectedTreeNodeId = ''" 
                         :class="!selectedTreeNodeId ? 'bg-primary-50 border-l-2 border-l-primary-500' : 'border-l-2 border-l-transparent hover:bg-gray-50'"
                         class="flex items-center gap-2 px-4 py-2.5 cursor-pointer transition select-none border-b border-gray-50">
                        <i class="fas fa-globe text-primary-500 text-xs"></i>
                        <span class="text-xs font-bold" :class="!selectedTreeNodeId ? 'text-primary-700' : 'text-gray-600'">全部实例</span>
                        <span class="text-[9px] font-bold text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded ml-auto" x-text="instances.length"></span>
                    </div>

                    <template x-for="app in instanceTreeData" :key="app.id">
                        <div class="border-b border-gray-50 last:border-b-0">
                            <!-- App Node -->
                            <div @click="toggleInstanceTreeNode(app)" 
                                 class="flex items-center gap-2 px-4 py-2.5 cursor-pointer hover:bg-gray-50 transition select-none">
                                <i :class="app.expanded ? 'fas fa-chevron-down' : 'fas fa-chevron-right'" class="text-[9px] text-gray-400 w-3 text-center"></i>
                                <i class="fas fa-cube text-blue-500 text-xs"></i>
                                <span class="text-xs font-bold text-gray-700 truncate flex-1" x-text="app.name" :title="app.name"></span>
                                <span class="text-[9px] font-bold text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded" x-text="app.count"></span>
                            </div>

                            <!-- Service Nodes (inside App) -->
                            <div x-show="app.expanded" x-collapse>
                                <template x-for="svc in app.children" :key="svc.id">
                                    <div @click="selectTreeServiceNode(svc)"
                                         :class="selectedTreeNodeId === svc.id ? 'bg-primary-50 border-l-2 border-l-primary-500' : 'border-l-2 border-l-transparent hover:bg-gray-50'"
                                         class="flex items-center gap-2 pl-8 pr-4 py-2 cursor-pointer transition select-none">
                                        <i class="fas fa-sitemap text-purple-400 text-[10px]"></i>
                                        <span class="text-[11px] font-bold truncate flex-1" 
                                              :class="selectedTreeNodeId === svc.id ? 'text-primary-700' : 'text-gray-600'"
                                              x-text="svc.name" :title="svc.name"></span>
                                        <div class="flex items-center gap-1.5">
                                            <span x-show="svc.onlineCount > 0" class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                                            <span x-show="svc.offlineCount > 0" class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
                                            <span class="text-[9px] font-bold text-gray-400" x-text="svc.count"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Right Column: Instance Card List -->
        <div class="flex-1 min-w-0">
            <!-- Selection Breadcrumb -->
            <div x-show="selectedTreeNodeId" class="mb-4 flex items-center gap-2">
                <div class="bg-primary-50 border border-primary-200 rounded-lg px-3 py-1.5 flex items-center gap-2">
                    <i class="fas fa-sitemap text-primary-500 text-xs"></i>
                    <span class="text-xs font-bold text-primary-700" x-text="getSelectedTreeNodeLabel()"></span>
                    <button @click="selectedTreeNodeId = ''" class="text-primary-400 hover:text-primary-600 transition ml-1">
                        <i class="fas fa-times text-[10px]"></i>
                    </button>
                </div>
                <span class="text-[10px] text-gray-400" x-text="filteredInstances().length + ' 个实例'"></span>
            </div>
            <div x-show="!selectedTreeNodeId" class="mb-4">
                <p class="text-xs text-gray-400"><i class="fas fa-info-circle mr-1"></i>点击左侧服务节点可筛选实例列表</p>
            </div>

            <!-- Instance Cards -->
            <div class="space-y-3">
                <template x-for="inst in filteredInstances()" :key="inst.agent_id">
                    <div @click="showInstanceDetails(inst)" 
                         class="bg-white border border-gray-100 rounded-xl p-4 hover:border-primary-300 hover:shadow-md transition cursor-pointer group">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3 overflow-hidden flex-1">
                                <!-- Status Icon -->
                                <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0"
                                     :class="inst.status?.state === 'online' ? 'bg-green-50 text-green-600' : 'bg-gray-50 text-gray-400'">
                                    <i class="fas fa-server text-sm"></i>
                                </div>
                                <div class="overflow-hidden flex-1 min-w-0">
                                    <div class="flex items-center gap-2">
                                        <span class="text-sm font-bold text-gray-800 truncate" x-text="inst.agent_id.substring(0, 16)"></span>
                                        <span class="text-[10px] bg-gray-100 text-gray-500 px-1 rounded font-normal flex-shrink-0" x-text="'v' + (inst.version || '0.0.0')"></span>
                                        <!-- Online/Offline badge -->
                                        <span class="px-1.5 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-tight flex-shrink-0"
                                              :class="inst.status?.state === 'online' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                                              x-text="inst.status?.state === 'online' ? 'ONLINE' : 'OFFLINE'"></span>
                                    </div>
                                    <div class="flex items-center gap-3 mt-1">
                                        <span class="text-[10px] text-gray-400 truncate flex items-center gap-1">
                                            <i class="fas fa-network-wired text-[8px]"></i>
                                            <span x-text="(inst.hostname || 'Unknown') + ' / ' + (inst.ip || '0.0.0.0')"></span>
                                        </span>
                                        <span class="text-[9px] text-gray-300">|</span>
                                        <span class="text-[10px] text-gray-400 truncate" x-text="(inst.app_id ? inst.app_id.substring(0,8) : 'Global') + ' / ' + (inst.service_name || 'default')"></span>
                                    </div>
                                </div>
                            </div>

                            <!-- Right side: status indicators + actions -->
                            <div class="flex items-center gap-4 flex-shrink-0 ml-3">
                                <!-- Arthas Status -->
                                <div class="flex flex-col items-end gap-0.5">
                                    <div class="flex items-center gap-1.5">
                                        <span class="inline-flex rounded-full h-2 w-2"
                                              :class="inst.arthasStatus?.tunnelReady ? 'bg-purple-500' : 'bg-gray-300'"></span>
                                        <span class="text-[10px] font-medium"
                                              :class="inst.arthasStatus?.tunnelReady ? 'text-purple-600' : 'text-gray-400'"
                                              x-text="inst.arthasStatus?.tunnelReady ? 'Arthas 就绪' : 'Arthas 未注册'"></span>
                                    </div>
                                    <div class="text-[9px] text-gray-400">
                                        <span x-text="'心跳 ' + formatRelativeTime(inst.last_heartbeat)"></span>
                                        <span x-show="inst.start_time" class="ml-1" x-text="'· 运行 ' + formatUptime(inst.start_time)"></span>
                                    </div>
                                </div>

                                <!-- Action Buttons -->
                                <div class="flex items-center gap-1">
                                    <button @click.stop="openArthas(inst)"
                                        :disabled="inst.operating || arthasSession.connecting"
                                        class="p-1.5 text-gray-400 hover:text-primary-600 hover:bg-primary-50 rounded-md transition disabled:opacity-50 disabled:cursor-not-allowed"
                                        :title="inst.arthasStatus?.tunnelReady ? 'Connect Arthas' : 'Attach & Connect Arthas'">
                                        <i :class="inst.operating || (arthasSession.connecting && arthasSession.agentInfo?.agent_id === inst.agent_id) ? 'fas fa-spinner fa-spin' : 'fas fa-bug'" class="text-sm"></i>
                                    </button>
                                    <button @click.stop="showInstanceDetails(inst)" class="p-1.5 text-gray-400 hover:text-primary-600 hover:bg-primary-50 rounded-md transition" title="查看详情">
                                        <i class="fas fa-external-link-alt text-sm"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Empty State -->
                <div x-show="filteredInstances().length === 0" class="bg-white rounded-xl shadow-sm border border-gray-100 p-12 text-center text-gray-500">
                    <i class="fas fa-server text-4xl mb-3 text-gray-200"></i>
                    <p class="text-gray-400">没有符合条件的实例</p>
                    <p class="text-[10px] text-gray-300 mt-1" x-show="instanceSearch">尝试修改搜索关键词或清除筛选条件</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Instance Detail Slide-over -->
<template x-teleport="body">
    <div x-show="instanceDrawerOpen" 
        class="fixed inset-0 z-[9999] overflow-hidden" x-cloak
        x-transition:enter="transition ease-in-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in-out duration-300"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0">
        
        <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm" @click="instanceDrawerOpen = false"></div>
        
        <div class="fixed inset-y-0 right-0 max-w-2xl w-full bg-white shadow-2xl flex flex-col"
            x-transition:enter="transform transition ease-in-out duration-300"
            x-transition:enter-start="translate-x-full"
            x-transition:enter-end="translate-x-0"
            x-transition:leave="transform transition ease-in-out duration-300"
            x-transition:leave-start="translate-x-0"
            x-transition:leave-end="translate-x-full">
        
            <!-- Drawer Header -->
            <div class="p-6 border-b border-gray-100 flex items-center justify-between bg-gray-50">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl shadow-lg"
                         :class="selectedInstance?.status?.state === 'online' ? 'bg-green-600 text-white shadow-green-200' : 'bg-gray-400 text-white shadow-gray-200'">
                        <i class="fas fa-server"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-gray-800" x-text="selectedInstance?.agent_id"></h3>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase"
                                :class="selectedInstance?.status?.state === 'online' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                                x-text="selectedInstance?.status?.state === 'online' ? 'ONLINE' : 'OFFLINE'"></span>
                            <span class="text-[10px] text-gray-400" x-text="(selectedInstance?.hostname || '') + ' / ' + (selectedInstance?.ip || '')"></span>
                            <span class="text-[10px] bg-gray-100 text-gray-500 px-1.5 rounded" x-text="'v' + (selectedInstance?.version || '0.0.0')"></span>
                        </div>
                    </div>
                </div>
                <button @click="instanceDrawerOpen = false" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-white rounded-full transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <!-- Drawer Content -->
            <div class="flex-1 overflow-y-auto p-6 space-y-8">
                <!-- Basic Info Section -->
                <section>
                    <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                        <i class="fas fa-info-circle text-primary-500 text-xs"></i> 基础信息
                    </h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">Agent ID</p>
                            <p class="font-mono text-xs text-gray-800 break-all" x-text="selectedInstance?.agent_id || '-'"></p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">版本</p>
                            <p class="font-bold text-gray-800" x-text="selectedInstance?.version || '-'"></p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">主机名</p>
                            <p class="font-bold text-gray-800" x-text="selectedInstance?.hostname || '-'"></p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">IP 地址</p>
                            <p class="font-bold text-gray-800" x-text="selectedInstance?.ip || '-'"></p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">应用 ID</p>
                            <p class="font-mono text-xs text-gray-800" x-text="selectedInstance?.app_id || 'Global'"></p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <p class="text-[10px] font-bold text-gray-400 mb-1 uppercase">服务名称</p>
                            <p class="font-bold text-gray-800" x-text="selectedInstance?.service_name || 'default'"></p>
                        </div>
                    </div>
                </section>

                <!-- Arthas Status Section -->
                <section>
                    <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                        <i class="fas fa-bug text-purple-500 text-xs"></i> Arthas 状态
                    </h4>
                    <div class="bg-gray-50 p-5 rounded-xl border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg flex items-center justify-center"
                                     :class="selectedInstance?.arthasStatus?.tunnelReady ? 'bg-purple-100 text-purple-600' : 'bg-gray-100 text-gray-400'">
                                    <i class="fas fa-bug text-sm"></i>
                                </div>
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="inline-flex rounded-full h-2.5 w-2.5"
                                              :class="selectedInstance?.arthasStatus?.tunnelReady ? 'bg-purple-500' : 'bg-gray-300'"></span>
                                        <span class="text-sm font-bold"
                                              :class="selectedInstance?.arthasStatus?.tunnelReady ? 'text-purple-700' : 'text-gray-500'"
                                              x-text="selectedInstance?.arthasStatus?.tunnelReady ? 'Tunnel 已连接' : 'Tunnel 未连接'"></span>
                                    </div>
                                    <div x-show="selectedInstance?.arthasStatus?.arthasVersion" class="text-[10px] text-gray-400 mt-0.5">
                                        Arthas Version: <span x-text="selectedInstance?.arthasStatus?.arthasVersion"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button @click="openArthas(selectedInstance)"
                                    :disabled="selectedInstance?.operating || arthasSession.connecting"
                                    class="px-3 py-1.5 text-xs font-bold rounded-lg transition disabled:opacity-50"
                                    :class="selectedInstance?.arthasStatus?.tunnelReady ? 'bg-purple-100 text-purple-700 hover:bg-purple-200' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'">
                                    <i :class="selectedInstance?.operating || arthasSession.connecting ? 'fas fa-spinner fa-spin' : 'fas fa-terminal'" class="mr-1"></i>
                                    <span x-text="selectedInstance?.arthasStatus?.tunnelReady ? '连接终端' : 'Attach & 连接'"></span>
                                </button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Attributes Section -->
                <section>
                    <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                        <i class="fas fa-tags text-primary-500 text-xs"></i> 元数据 (Attributes)
                    </h4>
                    <div class="grid grid-cols-2 gap-3">
                        <template x-for="(val, key) in (selectedInstance?.attributes || selectedInstance?.labels || {})" :key="key">
                            <div class="p-3 bg-gray-50 rounded-lg border border-gray-100 overflow-hidden">
                                <div class="text-[10px] text-gray-400 font-mono truncate" x-text="key"></div>
                                <div class="text-sm font-medium text-gray-800 mt-1 truncate" x-text="val"></div>
                            </div>
                        </template>
                        <div x-show="Object.keys(selectedInstance?.attributes || selectedInstance?.labels || {}).length === 0"
                            class="col-span-2 text-sm text-gray-400 bg-gray-50 border border-gray-100 rounded-lg p-4 text-center">
                            <i class="fas fa-inbox text-gray-200 text-xl block mb-2"></i>
                            无元数据
                        </div>
                    </div>
                </section>

                <!-- Lifecycle Timeline Section -->
                <section>
                    <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                        <i class="fas fa-history text-primary-500 text-xs"></i> 生命周期
                    </h4>
                    <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm">
                        <div class="grid grid-cols-2 gap-y-4 gap-x-6">
                            <div>
                                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">启动时间</p>
                                <p class="text-xs text-gray-700 font-medium" x-text="formatFullTime(selectedInstance?.start_time)"></p>
                                <p x-show="selectedInstance?.start_time" class="text-[10px] text-primary-600 mt-0.5" x-text="'已运行 ' + formatUptime(selectedInstance?.start_time)"></p>
                            </div>
                            <div>
                                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">注册时间</p>
                                <p class="text-xs text-gray-700 font-medium" x-text="formatFullTime(selectedInstance?.registered_at)"></p>
                            </div>
                            <div>
                                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">最后心跳</p>
                                <p class="text-xs text-gray-700 font-medium" x-text="formatFullTime(selectedInstance?.last_heartbeat)"></p>
                                <p class="text-[10px] text-green-600 mt-0.5" x-text="formatRelativeTime(selectedInstance?.last_heartbeat)"></p>
                            </div>
                            <div>
                                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">状态</p>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <div class="relative flex h-2 w-2">
                                        <span x-show="selectedInstance?.status?.state === 'online'" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                        <span class="relative inline-flex rounded-full h-2 w-2" 
                                            :class="selectedInstance?.status?.state === 'online' ? 'bg-green-500' : 'bg-gray-400'"></span>
                                    </div>
                                    <span class="text-xs font-bold" 
                                        :class="selectedInstance?.status?.state === 'online' ? 'text-green-600' : 'text-gray-500'"
                                        x-text="selectedInstance?.status?.state === 'online' ? '在线' : '离线'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Drawer Footer -->
            <div class="p-6 border-t border-gray-100 bg-gray-50 flex gap-3">
                <button @click="copyToClipboard(selectedInstance?.agent_id || '')" 
                    class="flex-1 px-4 py-3 bg-white border border-gray-200 text-gray-600 rounded-xl font-bold hover:bg-gray-50 transition flex items-center justify-center gap-2">
                    <i class="fas fa-copy"></i> 复制 Agent ID
                </button>
                <button @click="unRegisterAgent(selectedInstance)" 
                    :disabled="selectedInstance?.status?.state !== 'offline'"
                    class="flex-1 px-4 py-3 bg-red-50 text-red-600 rounded-xl font-bold hover:bg-red-100 transition flex items-center justify-center gap-2 disabled:opacity-30 disabled:grayscale">
                    <i class="fas fa-sign-out-alt"></i> 下线实例
                </button>
            </div>
        </div>
    </div>
</template>
