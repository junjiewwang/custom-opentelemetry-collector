<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTel Collector Admin</title>
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome (local) - 避免 CDN 加载慢 -->
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
    <!-- Local Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- xterm.js Terminal -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11/lib/addon-web-links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15/lib/addon-search.min.js"></script>
    <!-- App Entry (ES Module) - 必须在 Alpine 之前加载 -->
    <script type="module" src="js/main.js?v=20260105v2"></script>
    <!-- Alpine.js Collapse Plugin - 必须在 Alpine.js 之前加载 -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <!-- Alpine.js - defer 确保在 DOM 解析完成后执行 -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen" x-data="adminApp()" x-init="init()">
    <!-- ========================================================================== -->
    <!-- Login Screen -->
    <!-- ========================================================================== -->
    <div x-show="!authenticated" x-cloak class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 to-gray-800">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 slide-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-satellite-dish text-primary-600 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">OTel Admin</h1>
                <p class="text-gray-500 mt-1">Control Plane Dashboard</p>
            </div>
            <form @submit.prevent="login()">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">API Key</label>
                        <div class="relative">
                            <input :type="showApiKey ? 'text' : 'password'" x-model="apiKeyInput" required
                                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 pr-12"
                                placeholder="Enter your API Key">
                            <button type="button" @click="showApiKey = !showApiKey" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <i :class="showApiKey ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="rememberKey" x-model="rememberApiKey" 
                            class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
                        <label for="rememberKey" class="text-sm text-gray-600">Remember API Key</label>
                    </div>
                </div>
                <button type="submit" :disabled="loginLoading"
                    class="w-full mt-6 px-4 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition flex items-center justify-center gap-2 disabled:opacity-50">
                    <i x-show="loginLoading" class="fas fa-spinner fa-spin"></i>
                    <span x-text="loginLoading ? 'Authenticating...' : 'Login'"></span>
                </button>
                <p x-show="loginError" x-text="loginError" class="mt-4 text-center text-sm text-red-500"></p>
            </form>
            <p class="mt-6 text-xs text-gray-400 text-center">API Key is configured in the collector config file</p>
        </div>
    </div>

    <!-- ========================================================================== -->
    <!-- Main App (shown after login) -->
    <!-- ========================================================================== -->
    <div x-show="authenticated" x-cloak>
        <!-- Sidebar -->
        <aside class="fixed left-0 top-0 h-full w-64 bg-gray-900 text-white shadow-xl z-50">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-satellite-dish text-primary-400"></i>
                    OTel Admin
                </h1>
                <p class="text-gray-400 text-sm mt-1">Control Plane Dashboard</p>
            </div>
            <nav class="p-4 space-y-2">
                <template x-for="item in menuItems" :key="item.id">
                    <button @click="currentView = item.id" 
                        :class="currentView === item.id ? 'bg-primary-600 text-white' : 'text-gray-300 hover:bg-gray-800'"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-200">
                        <i :class="item.icon" class="w-5 text-center"></i>
                        <span x-text="item.label"></span>
                        <span x-show="item.badge" x-text="item.badge" 
                            class="ml-auto bg-primary-500 text-xs px-2 py-0.5 rounded-full"></span>
                    </button>
                </template>
            </nav>
            <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-700">
                <div class="flex items-center justify-between text-sm text-gray-400">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full" :class="connected ? 'bg-green-500' : 'bg-red-500'"></span>
                        <span x-text="connected ? 'Connected' : 'Disconnected'"></span>
                    </div>
                    <button @click="logout()" class="text-gray-400 hover:text-white transition" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="ml-64 p-8">
            <!-- ================================================================== -->
            <!-- Dashboard View -->
            <!-- ================================================================== -->
            <div x-show="currentView === 'dashboard'" x-cloak class="fade-in">
                <template x-if="viewTemplates.dashboard">
                    <div x-html="viewTemplates.dashboard"></div>
                </template>
                <template x-if="!viewTemplates.dashboard">
                    <div class="flex items-center justify-center h-64">
                        <i class="fas fa-spinner fa-spin text-3xl text-primary-600"></i>
                    </div>
                </template>
            </div>

            <!-- ================================================================== -->
            <!-- Apps View -->
            <!-- ================================================================== -->
            <div x-show="currentView === 'apps'" x-cloak class="fade-in">
                <template x-if="viewTemplates.apps">
                    <div x-html="viewTemplates.apps"></div>
                </template>
                <template x-if="!viewTemplates.apps">
                    <div class="flex items-center justify-center h-64">
                        <i class="fas fa-spinner fa-spin text-3xl text-primary-600"></i>
                    </div>
                </template>
            </div>

            <!-- ================================================================== -->
            <!-- Instances View -->
            <!-- ================================================================== -->
            <div x-show="currentView === 'instances'" x-cloak class="fade-in">
                <template x-if="viewTemplates.instances">
                    <div x-html="viewTemplates.instances"></div>
                </template>
                <template x-if="!viewTemplates.instances">
                    <div class="flex items-center justify-center h-64">
                        <i class="fas fa-spinner fa-spin text-3xl text-primary-600"></i>
                    </div>
                </template>
            </div>

            <!-- ================================================================== -->
            <!-- Services View -->
            <!-- ================================================================== -->
            <div x-show="currentView === 'services'" x-cloak class="fade-in">
                <template x-if="viewTemplates.services">
                    <div x-html="viewTemplates.services"></div>
                </template>
                <template x-if="!viewTemplates.services">
                    <div class="flex items-center justify-center h-64">
                        <i class="fas fa-spinner fa-spin text-3xl text-primary-600"></i>
                    </div>
                </template>
            </div>

            <!-- ================================================================== -->
            <!-- Tasks View -->
            <!-- ================================================================== -->
            <div x-show="currentView === 'tasks'" x-cloak class="fade-in">
                <template x-if="viewTemplates.tasks">
                    <div x-html="viewTemplates.tasks"></div>
                </template>
                <template x-if="!viewTemplates.tasks">
                    <div class="flex items-center justify-center h-64">
                        <i class="fas fa-spinner fa-spin text-3xl text-primary-600"></i>
                    </div>
                </template>
            </div>

            <!-- ================================================================== -->
            <!-- Configs View -->
            <!-- ================================================================== -->
            <div x-show="currentView === 'configs'" x-cloak class="fade-in h-[calc(100vh-160px)]">
                <template x-if="viewTemplates.configs">
                    <div x-html="viewTemplates.configs" class="h-full"></div>
                </template>
                <template x-if="!viewTemplates.configs">
                    <div class="flex items-center justify-center h-full">
                        <i class="fas fa-spinner fa-spin text-3xl text-primary-600"></i>
                    </div>
                </template>
            </div>


        </main>
    </div>

    <!-- ========================================================================== -->
    <!-- Modals -->
    <!-- ========================================================================== -->
    
    <!-- Create App Modal -->
    <div x-show="showCreateAppModal" x-cloak 
        class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" 
        @click.self="showCreateAppModal = false">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 slide-in">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Create Application</h3>
            <form @submit.prevent="createApp()">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
                        <input type="text" x-model="newApp.name" required
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                            placeholder="my-application">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea x-model="newApp.description" rows="3"
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                            placeholder="Application description..."></textarea>
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" @click="showCreateAppModal = false" 
                        class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition">Cancel</button>
                    <button type="submit" 
                        class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition">Create</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Set Token Modal -->
    <div x-show="showSetTokenModal" x-cloak 
        class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" 
        @click.self="showSetTokenModal = false">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 slide-in">
            <h3 class="text-xl font-bold text-gray-800 mb-2">Manage Token</h3>
            <p class="text-sm text-gray-500 mb-4" x-show="setTokenApp">
                Application: <span class="font-medium text-gray-700" x-text="setTokenApp?.name"></span>
            </p>
            
            <!-- Current Token Display -->
            <div class="mb-4 p-3 bg-gray-50 rounded-lg">
                <label class="block text-xs font-medium text-gray-500 mb-1">Current Token</label>
                <div class="flex items-center gap-2">
                    <code class="text-sm bg-white px-2 py-1 rounded border flex-1 truncate" x-text="setTokenApp?.token"></code>
                    <button @click="copyToClipboard(setTokenApp?.token)" class="text-gray-400 hover:text-gray-600 p-1" title="Copy">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>

            <form @submit.prevent="setCustomToken()">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">New Token (Optional)</label>
                        <input type="text" x-model="customToken" 
                            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                            placeholder="Enter custom token or leave empty" :maxlength="MAX_TOKEN_LENGTH">
                        <p class="text-xs text-gray-400 mt-1">Max <span x-text="MAX_TOKEN_LENGTH"></span> characters.</p>
                    </div>
                </div>
                <div class="flex justify-between gap-3 mt-6">
                    <button type="button" @click="regenerateTokenInModal()" 
                        class="px-4 py-2 bg-warning-100 text-warning-700 rounded-lg hover:bg-warning-200 transition flex items-center gap-2">
                        <i class="fas fa-sync-alt"></i> Generate Random
                    </button>
                    <div class="flex gap-3">
                        <button type="button" @click="showSetTokenModal = false" 
                            class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition">Cancel</button>
                        <button type="submit" :disabled="!customToken"
                            class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                            Set Custom Token
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Detail Modal (Generic) -->
    <div x-show="showDetailModal" x-cloak 
        class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" 
        @click.self="showDetailModal = false">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl p-6 slide-in max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-gray-800" x-text="detailTitle"></h3>
                <button @click="showDetailModal = false" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <pre class="bg-gray-50 rounded-lg p-4 text-sm overflow-x-auto" x-text="JSON.stringify(detailData, null, 2)"></pre>
        </div>
    </div>

    <!-- ========================================================================== -->
    <!-- Terminal Container (xterm.js) -->
    <!-- ========================================================================== -->
    <div id="terminalContainer" class="hidden"></div>

    <!-- ========================================================================== -->
    <!-- Toast Notification -->
    <!-- ========================================================================== -->
    <div x-show="toast.show" x-cloak
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 translate-y-2"
        class="fixed bottom-6 right-6 z-50">
        <div class="px-6 py-3 rounded-lg shadow-lg flex items-center gap-3"
            :class="{
                'bg-green-600 text-white': toast.type === 'success',
                'bg-red-600 text-white': toast.type === 'error',
                'bg-blue-600 text-white': toast.type === 'info'
            }">
            <i :class="{
                'fas fa-check-circle': toast.type === 'success',
                'fas fa-exclamation-circle': toast.type === 'error',
                'fas fa-info-circle': toast.type === 'info'
            }"></i>
            <span x-text="toast.message"></span>
        </div>
    </div>
</body>
</html>
