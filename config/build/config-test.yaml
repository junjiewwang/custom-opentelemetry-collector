connectors:
  spanmetrics:
    exemplars:
      enabled: true
    metrics_expiration: 5m
    namespace: span.metrics
    resource_metrics_key_attributes:
      - service.name
      - telemetry.sdk.language
      - telemetry.sdk.name
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
  # TestDataGen Receiver - 生成测试数据
  testdatagen:
    interval: 10s
    scenarios:
      # ============ 基础场景（使用 Case + ExecuteFlow 引擎）============
      - name: "basic_trace"
        enabled: true
        config:
          service_name: "user-service"
          error_rate: 0.0

      - name: "error_trace"
        enabled: true
        config:
          service_name: "payment-service"
          error_rate: 0.5

      - name: "multi_service_trace"
        enabled: true
        config:
          error_rate: 0.0

      - name: "basic_metric"
        enabled: true
        config:
          service_name: "metric-test-service"
          metric_count: 5
          data_point_count: 3

      # ============ 消息队列场景 ============
      - name: "kafka_messaging"
        enabled: true
        config:
          topic: "order-events"
          consumer_group: "payment-processor-group"
          error_rate: 0.05

      - name: "rocketmq_messaging"
        enabled: true
        config:
          topic: "payment-topic"
          client_group: "account-consumer-group"
          message_type: "transaction"
          tag: "pay-success"
          error_rate: 0.05

      - name: "rabbitmq_messaging"
        enabled: false
        config:
          exchange: "notification-exchange"
          routing_key: "email.send"
          queue: "email-queue"
          error_rate: 0.05

      # ============ 数据库场景 ============
      - name: "mysql_database"
        enabled: true
        config:
          service_name: "user-service"
          db_name: "user_db"
          table: "users"
          error_rate: 0.05

      - name: "redis_database"
        enabled: true
        config:
          service_name: "product-service"
          error_rate: 0.02

      - name: "mongodb_database"
        enabled: true
        config:
          service_name: "content-service"
          db_name: "content_db"
          collection: "articles"
          error_rate: 0.03

    # ============ 业务流（Business Flow）============
    # 模拟真实微服务调用链，一条 Trace 跨越多个服务
    flows:
      - name: "ecommerce_order"
        enabled: true
        config:
          error_rate: 0.05

      - name: "user_login"
        enabled: true
        config:
          error_rate: 0.03

exporters:
  debug:
    verbosity: detailed
  otlp/tencent:
    endpoint: ap-guangzhou.apm.tencentcs.com:4319
    headers:
      authorization: "Bearer WZZEnSoSMZMsHYqiblIE"
    tls:
      insecure: true
  otlphttp/tencent:
    endpoint: http://ap-guangzhou.apm.tencentcs.com:90/otlp
    headers:
      authorization: "Bearer WZZEnSoSMZMsHYqiblIE"
    compression: ""
    tls:
      insecure: true

processors:
  batch: {}
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  resource/tencent:
    attributes:
      - action: upsert
        key: token
        value: LsITVpSiKOHbZCXpYNZa

service:
  pipelines:
    traces:
      exporters:
        - otlp/tencent
        - debug
      processors:
        - memory_limiter
        - batch
        - resource/tencent
      receivers:
        - otlp
    traces/2:
      exporters:
        - otlphttp/tencent
        - debug
      processors:
        - memory_limiter
        - batch
      receivers:
        - testdatagen
  telemetry:
    metrics:
      address: 0.0.0.0:8888